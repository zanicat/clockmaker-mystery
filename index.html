<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Ivy Quinn Mysteries</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <section id="screen-title" class="screen">
    <div id="title-art"></div>
    <div id="title-card">
      <h1>The Ivy Quinn Mysteries</h1>
      <p class="subtitle">A point-and-click mystery series</p>
      <div id="chapter-list"></div>
      <p class="title-note">A point-and-click mystery</p>
    </div>
  </section>

  <section id="screen-end" class="screen hidden">
    <div id="end-art"></div>
    <div id="end-card">
      <p class="end-kicker" id="end-kicker"></p>
      <h1 id="end-title"></h1>
      <p class="end-body" id="end-body"></p>
      <div class="title-buttons">
        <button id="btn-end-next" class="btn hidden">Begin the next chapter</button>
        <button id="btn-end-title" class="btn">Return to Title</button>
      </div>
    </div>
  </section>

  <section id="screen-game" class="screen hidden">
    <header id="topbar">
      <button id="btn-menu" class="chip" title="Menu">&#9776; Menu</button>
      <div id="scene-name"></div>
      <div id="topbar-right">
        <button id="btn-spots" class="chip" title="Briefly highlight everything you can interact with">&#128065; Spots</button>
        <button id="btn-journal" class="chip" title="Review clues and past dialogue">&#128214; Casebook</button>
        <button id="btn-hint" class="chip" title="Get a hint">&#128161; Hint</button>
      </div>
    </header>

    <div id="stage-outer">
      <div id="stage">
        <div id="scene-bg"></div>
        <div id="scene-hotspots"></div>

        <div id="zoom" class="hidden">
          <div id="zoom-panel">
            <div id="zoom-head">
              <span id="zoom-title"></span>
              <button id="zoom-close" class="chip" title="Back">&#10005;</button>
            </div>
            <div id="zoom-stage">
              <div id="zoom-bg"></div>
              <div id="zoom-hotspots"></div>
            </div>
          </div>
        </div>

        <div id="dialogue-catcher" class="hidden"></div>
        <div id="dialogue" class="hidden">
          <div id="dialogue-who"></div>
          <div id="dialogue-text"></div>
          <div id="dialogue-more">&#9662;</div>
        </div>

        <div id="puzzle" class="hidden">
          <div id="puzzle-panel">
            <div id="puzzle-head">
              <span id="puzzle-title"></span>
              <button id="puzzle-close" class="chip" title="Step away">&#10005;</button>
            </div>
            <div id="puzzle-body"></div>
          </div>
        </div>

        <div id="journal" class="hidden">
          <div id="journal-panel">
            <div id="journal-head">
              <div id="journal-tabs">
                <button id="tab-clues" class="chip">Clues</button>
                <button id="tab-log" class="chip">Dialogue</button>
              </div>
              <button id="journal-close" class="chip" title="Close">&#10005;</button>
            </div>
            <div id="journal-body"></div>
          </div>
        </div>

        <div id="modal" class="hidden">
          <div id="modal-panel">
            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>
            <div id="modal-buttons"></div>
          </div>
        </div>
      </div>
    </div>

    <footer id="inventory">
      <span id="inv-label">Inventory</span>
      <div id="inv-slots"></div>
      <span id="inv-status"></span>
    </footer>
  </section>

</div>
<script src="js/art.js"></script>
<script src="js/art-ch2.js"></script>
<script src="js/art-ch3.js"></script>
<script src="js/art-ch4.js"></script>
<script src="js/art-ch5.js"></script>
<script src="js/art-ch6.js"></script>
<script src="js/sfx.js"></script>
<script src="js/data-ch1.js"></script>
<script src="js/data-ch2.js"></script>
<script src="js/data-ch3.js"></script>
<script src="js/data-ch4.js"></script>
<script src="js/data-ch5.js"></script>
<script src="js/data-ch6.js"></script>
<script src="js/engine.js"></script>
<script src="js/main.js"></script>
</body>
</html>
